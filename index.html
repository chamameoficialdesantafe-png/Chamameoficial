    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <style>
        :root { --rojo: #e60000; --oscuro: #0f0f0f; --gris: #1e1e1e; --texto: #ffffff; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: var(--oscuro); color: var(--texto); scroll-behavior: smooth; padding-top: 70px; }

        /* MENÚ DE NAVEGACIÓN */
        nav {
            background: rgba(15, 15, 15, 0.95);
            height: 70px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            border-bottom: 2px solid var(--rojo);
        }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--rojo); text-decoration: none; text-transform: uppercase; }
        .nav-links { display: flex; gap: 20px; list-style: none; margin: 0; padding: 0; }
        .nav-links a { 
            text-decoration: none; 
            color: white; 
            font-weight: 700; 
            font-size: 0.9rem; 
            text-transform: uppercase;
        }
        .nav-links a:hover { color: var(--rojo); }

        @media (max-width: 768px) {
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.7rem; }
        }

        /* HERO - ENCABEZADO */
        header { 
            height: 60vh; /* Se reduce la altura del encabezado */
            background: url('encabezado.jpg') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        /* Sección de título y subtítulo debajo de la foto */
        .hero-info {
            background-color: var(--oscuro);
            padding: 40px 20px;
            text-align: center;
        }
        .hero-info h1 { 
            font-family: 'MedievalSharp', cursive; /* Fuente mística */
            font-size: clamp(3rem, 10vw, 6rem); 
            margin: 0; 
            letter-spacing: -2px; 
            font-weight: 900; 
            text-transform: uppercase; 
            /* Diseño de letra místico: color y sombra */
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 65, 108, 0.7));
        }
        .hero-info p { 
            font-size: 1.2rem; 
            max-width: 600px; 
            font-weight: 400; 
            opacity: 0.9; 
            margin: 20px auto 0;
        }

        /* SECCIONES ESTILIZADAS */
        section { padding: 80px 5%; max-width: 1200px; margin: auto; }
        .section-title { font-size: 2.5rem; border-left: 5px solid var(--rojo); padding-left: 15px; margin-bottom: 40px; text-transform: uppercase; }

        /* SOBRE NOSOTROS & HISTORIA */
        .about-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .about-img { width: 100%; border-radius: 15px; filter: grayscale(30%); }
        .about-img:hover { filter: grayscale(0%); transform: scale(1.02); }
        @media (max-width: 768px) { .about-container { grid-template-columns: 1fr; } }

        /* TARJETAS DE INTEGRANTES */
        .grid-musicos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--gris); border-radius: 20px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .card:hover { transform: translateY(-10px); border-color: var(--rojo); }
        .card img { width: 100%; height: 400px; object-fit: cover; }
        .card-info { padding: 20px; background: linear-gradient(transparent, #000); position: absolute; bottom: 0; width: 100%; }
