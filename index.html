
<style>
        :root { 
            --rojo: #e60000; 
            /* El color oscuro de Spotify suele ser este o #121212 */
            --oscuro: #121212; 
            --gris: #181818; 
            --texto: #ffffff; 
        }
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            background-color: var(--oscuro); /* Fondo unificado */
            color: var(--texto); 
            padding-top: 70px; 
            overflow-x: hidden; 
        }

        /* NAVEGACIÓN */
        nav { 
            background: rgba(18, 18, 18, 0.95); /* Ajustado al fondo */
            height: auto; 
            min-height: 70px; 
            width: 100%; 
            position: fixed; 
            top: 0; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 10px 5%; 
            border-bottom: 2px solid var(--rojo); 
        }
        
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--rojo); text-decoration: none; text-transform: uppercase; cursor: pointer; margin-bottom: 5px; }
        
        .nav-links { 
            display: flex; 
            gap: 15px; 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            justify-content: center; 
            flex-wrap: wrap; 
        }

        .nav-links a { text-decoration: none; color: white; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }
        .nav-links a:hover { color: var(--rojo); }

        @media (min-width: 768px) {
            nav { flex-direction: row; justify-content: space-between; height: 70px; }
            .logo { margin-bottom: 0; }
            .nav-links { gap: 20px; }
            .nav-links a { font-size: 0.8rem; }
        }

        /* SECCIONES */
        section { display: none; padding: 40px 5%; max-width: 1200px; margin: auto; min-height: 80vh; }
        section.active { display: block; animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HERO AREA */
        .hero-container { position: relative; height: 50vh; width: 100%; overflow: hidden; border-radius: 0 0 20px 20px; background-color: var(--oscuro); }
        .hero-header { height: 100%; width: 100%; background: url('encabezado.jpg') no-repeat center center/cover; transition: transform 0.8s ease; }
        
        @media (max-width: 768px) {
            .hero-container { height: 35vh; }
            .hero-header { background-size: cover; }
        }

        .hero-container:hover .hero-header { transform: scale(1.05); }
        .hero-info { padding: 40px 20px; text-align: center; }
        .hero-info h1 { font-family: 'MedievalSharp', cursive; font-size: clamp(3rem, 10vw, 5rem); margin: 0; background: linear-gradient(45deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255, 65, 108, 0.5)); }

        /* REPRODUCTOR ESTILO SPOTIFY */
        .musica-footer { margin-top: 50px; padding: 30px; background: #181818; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .player-item { display: flex; align-items: center; justify-content: space-between; background: #282828; margin-bottom: 12px; padding: 12px 25px; border-radius: 8px; border: 1px solid transparent; }
        .player-item:hover { background: #333; }
        .player-info { display: flex; align-items: center; gap: 15px; flex-grow: 1; text-align: left; }
        .player-info i { color: var(--rojo); font-size: 1.2rem; }
        .track-name { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: white; }
        audio { height: 30px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .btn-spotify-inline { background: #1DB954; color: white; text-decoration: none; padding: 8px 18px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-left: 15px; }
        @media (max-width: 768px) { .player-item { flex-direction: column; border-radius: 12px; padding: 15px; } audio { width: 100%; margin: 10px 0; } .btn-spotify-inline { margin-left: 0; width: 100%; justify-content: center; } }

        /* HISTORIA Y TARJETAS */
        .card { background: #181818; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { background: #282828; border-color: var(--rojo); }
        .card img { width: 100%; height: 350px; object-fit: cover; border-bottom: 3px solid var(--rojo); }
        
        .video-box { background: #181818; padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }

        /* REDES SOCIALES */
        .social-btn { background: #282828; border: 1px solid rgba(255,255,255,0.1); }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
